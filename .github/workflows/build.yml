name: Build QQESign deb and dylib

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          set -e
          sudo mkdir -p /opt/theos
          sudo chown "$USER" /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> "$GITHUB_ENV"

      - name: Download iOS SDK
        run: |
          set -e
          mkdir -p /opt/theos/sdks
          cd /opt/theos/sdks
          curl -fL --retry 3 --retry-all-errors -O https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz
          tar -xJf iPhoneOS16.5.sdk.tar.xz
          rm -f iPhoneOS16.5.sdk.tar.xz

      - name: Install packaging tools
        run: |
          brew install ldid dpkg || true

      - name: Build dylib (Logos + clang, no Theos tweak.mk)
        run: |
          set -e
          export THEOS=/opt/theos
          SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDKROOT"

          LOGOS=$(find "$THEOS" -name "logos.pl" -path "*/bin/*" | head -1)
          echo "Using Logos: $LOGOS"
          perl "$LOGOS" Tweak.x > Tweak.x.m
          echo "=== Logos preprocessing done ==="

          if grep -q 'MSHookMessageEx\|MSHookFunction\|HBLogDebug' Tweak.x.m; then
            echo "ERROR: Logos output contains Substrate calls! Generator=internal not working"
            grep -n 'MSHook\|substrate\|Substrate' Tweak.x.m || true
            exit 1
          fi
          echo "OK: no Substrate references in preprocessed code"

          if grep -q 'method_setImplementation\|class_getInstanceMethod' Tweak.x.m; then
            echo "OK: internal generator produced ObjC runtime hooks"
          else
            echo "WARNING: no ObjC runtime hook calls found, hooks may not work"
          fi

          xcrun -sdk iphoneos clang -arch arm64 \
            -miphoneos-version-min=10.0 \
            -isysroot "$SDKROOT" \
            -fobjc-arc -DQQESIGN_SIDELOAD=1 \
            -dynamiclib \
            -install_name @rpath/QQESign.dylib \
            -framework UIKit -framework Foundation \
            -framework CoreGraphics -framework Photos \
            -o QQESign.dylib Tweak.x.m

          echo "Build succeeded"

      - name: Verify dylib
        run: |
          set -e
          file QQESign.dylib
          lipo -info QQESign.dylib
          otool -L QQESign.dylib
          if otool -L QQESign.dylib | grep -i substrate; then
            echo "ERROR: dylib links against CydiaSubstrate!"
            exit 1
          fi
          echo "OK: no substrate dependency"

      - name: Build deb package
        run: |
          set -e
          rm -rf package dist
          mkdir -p package/DEBIAN package/Library/MobileSubstrate/DynamicLibraries dist
          cp QQESign.dylib package/Library/MobileSubstrate/DynamicLibraries/QQESign.dylib
          cat > package/Library/MobileSubstrate/DynamicLibraries/QQESign.plist <<'PLIST'
          {
            Filter = {
              Bundles = (
                "com.tencent.mqq"
              );
            };
          }
          PLIST
          cat > package/DEBIAN/control <<'CTRL'
          Package: com.qqesign.tweak
          Name: QQESign
          Version: 1.0.${{ github.run_number }}
          Architecture: iphoneos-arm64
          Description: QQESign tweak for QQ NT
          Maintainer: Anfyya
          Author: Anfyya
          Section: Tweaks
          Depends: firmware (>= 10.0)
          CTRL
          dpkg-deb --build package QQESign.deb
          cp QQESign.dylib dist/QQESign.dylib
          cp QQESign.deb dist/QQESign.deb
          ls -la dist/

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: QQESign-dylib-arm64
          path: dist/QQESign.dylib
          if-no-files-found: error

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: QQESign-deb-arm64
          path: dist/QQESign.deb
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: QQESign v1.0.${{ github.run_number }}
          body: |
            QQESign arm64 dylib and deb package

            Commit: ${{ github.sha }}
          files: |
            dist/QQESign.dylib
            dist/QQESign.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
